services:
  resume-screening-dev:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: resume-screening-dev
    ports:
      - "8000:8000"
    environment:
      - TZ=Asia/Shanghai
      - CORS_ORIGINS=http://localhost:8000
    volumes:
      - ../server:/app/server
      - ../frontend:/app/frontend
      - ../website:/app/website
      - ../config:/app/config
      - ../logs:/app/logs
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload
