<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API配置 - 智能简历筛选工具</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .test-btn {
            padding: 8px 14px;
            font-size: 13px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            background: #f0f0ff;
            color: #4f46e5;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .test-btn:hover:not(:disabled) { background: #e0e0ff; }
        .test-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .test-result {
            font-size: 13px;
            margin-top: 4px;
            min-height: 20px;
        }
        .test-result.ok  { color: #16a34a; }
        .test-result.err { color: #dc2626; }
        .model-version-row {
            margin-top: 8px;
            display: flex;
            align-items: center;
        }
        .model-version-row .model-name {
            width: 120px;
            font-weight: 500;
            color: #555;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <!-- 页面头部 -->
    <header class="page-header">
        <h1 class="page-title">API 配置</h1>
        <button class="btn btn-secondary" id="btn-home">返回主页</button>
    </header>

    <div class="container">
        <!-- 当前使用模型 -->
        <div class="card mt-20">
            <div class="input-group" style="margin-bottom:0;">
                <label class="input-label">当前使用模型</label>
                <select class="input-field" id="current-model-select" style="max-width: 400px;">
                    <option value="doubao">字节豆包</option>
                    <option value="wenxin">百度文心</option>
                    <option value="qianwen">阿里千问</option>
                    <option value="zhipu">智谱GLM</option>
                    <option value="minmax">MinMax</option>
                    <option value="custom">自定义模型</option>
                </select>
            </div>
        </div>

        <!-- 主流大模型配置 -->
        <div class="config-section mt-20">
            <div class="header">主流大模型配置</div>
            <div class="body">

                <!-- 字节豆包 -->
                <div class="model-row">
                    <span class="model-name">字节豆包</span>
                    <input type="text" class="input-field" id="doubao-endpoint"
                           placeholder="API Endpoint"
                           value="https://ark.cn-beijing.volces.com/api/v3/chat/completions"
                           readonly>
                    <input type="password" class="input-field" id="doubao-key"
                           placeholder="API Key"
                           style="margin-left: 12px; max-width: 300px;">
                    <button class="test-btn" style="margin-left:10px;" onclick="testModel('doubao')">测试连通</button>
                </div>
                <div class="model-version-row">
                    <span class="model-name" style="font-size:13px;">模型版本</span>
                    <input type="text" class="input-field" id="doubao-version"
                           placeholder="可选，如 doubao-pro-32k-240928"
                           style="max-width:320px;">
                </div>
                <div class="test-result" id="doubao-test-result"></div>

                <hr style="border:none;border-top:1px solid #f0f0f0;margin:16px 0;">

                <!-- 百度文心 -->
                <div class="model-row">
                    <span class="model-name">百度文心</span>
                    <input type="text" class="input-field" id="wenxin-endpoint"
                           placeholder="API Endpoint"
                           value="https://aip.baidubce.com/rpc/2.0/ai_custom/v1/wenxinworkshop/chat/completions"
                           readonly>
                    <input type="password" class="input-field" id="wenxin-key"
                           placeholder="API Key"
                           style="margin-left: 12px; max-width: 300px;">
                    <button class="test-btn" style="margin-left:10px;" onclick="testModel('wenxin')">测试连通</button>
                </div>
                <div class="model-version-row">
                    <span class="model-name" style="font-size:13px;">模型版本</span>
                    <input type="text" class="input-field" id="wenxin-version"
                           placeholder="可选，如 ernie-4.0-8k"
                           style="max-width:320px;">
                </div>
                <div class="test-result" id="wenxin-test-result"></div>

                <hr style="border:none;border-top:1px solid #f0f0f0;margin:16px 0;">

                <!-- 阿里千问 -->
                <div class="model-row">
                    <span class="model-name">阿里千问</span>
                    <input type="text" class="input-field" id="qianwen-endpoint"
                           placeholder="API Endpoint"
                           value="https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions"
                           readonly>
                    <input type="password" class="input-field" id="qianwen-key"
                           placeholder="API Key"
                           style="margin-left: 12px; max-width: 300px;">
                    <button class="test-btn" style="margin-left:10px;" onclick="testModel('qianwen')">测试连通</button>
                </div>
                <div class="model-version-row">
                    <span class="model-name" style="font-size:13px;">模型版本</span>
                    <input type="text" class="input-field" id="qianwen-version"
                           placeholder="可选，如 qwen-plus、qwen-max"
                           style="max-width:320px;">
                </div>
                <div class="test-result" id="qianwen-test-result"></div>

                <hr style="border:none;border-top:1px solid #f0f0f0;margin:16px 0;">

                <!-- 智谱GLM -->
                <div class="model-row">
                    <span class="model-name">智谱GLM</span>
                    <input type="text" class="input-field" id="zhipu-endpoint"
                           placeholder="API Endpoint"
                           value="https://open.bigmodel.cn/api/paas/v4/chat/completions"
                           readonly>
                    <input type="password" class="input-field" id="zhipu-key"
                           placeholder="API Key"
                           style="margin-left: 12px; max-width: 300px;">
                    <button class="test-btn" style="margin-left:10px;" onclick="testModel('zhipu')">测试连通</button>
                </div>
                <div class="model-version-row">
                    <span class="model-name" style="font-size:13px;">模型版本</span>
                    <input type="text" class="input-field" id="zhipu-version"
                           placeholder="可选，如 glm-4、glm-4-flash"
                           style="max-width:320px;">
                </div>
                <div class="test-result" id="zhipu-test-result"></div>

                <hr style="border:none;border-top:1px solid #f0f0f0;margin:16px 0;">

                <!-- MinMax -->
                <div class="model-row">
                    <span class="model-name">MinMax</span>
                    <input type="text" class="input-field" id="minmax-endpoint"
                           placeholder="API Endpoint"
                           value="https://api.minimax.chat/v1/text/chatcompletion_v2"
                           readonly>
                    <input type="password" class="input-field" id="minmax-key"
                           placeholder="API Key"
                           style="margin-left: 12px; max-width: 300px;">
                    <button class="test-btn" style="margin-left:10px;" onclick="testModel('minmax')">测试连通</button>
                </div>
                <div class="model-version-row">
                    <span class="model-name" style="font-size:13px;">模型版本</span>
                    <input type="text" class="input-field" id="minmax-version"
                           placeholder="可选，如 abab6.5s-chat"
                           style="max-width:320px;">
                </div>
                <div class="test-result" id="minmax-test-result"></div>

            </div>
        </div>

        <!-- 自定义模型配置 -->
        <div class="config-section mt-20" id="custom-section">
            <div class="header">自定义模型配置</div>
            <div class="body">
                <div class="model-row">
                    <span class="model-name">模型名称</span>
                    <input type="text" class="input-field" id="custom-name"
                           placeholder="请输入自定义模型名称"
                           style="max-width: 400px;">
                </div>
                <div class="model-row">
                    <span class="model-name">API Endpoint</span>
                    <input type="text" class="input-field" id="custom-endpoint"
                           placeholder="请输入API端点地址">
                </div>
                <div class="model-row">
                    <span class="model-name">API Key</span>
                    <input type="password" class="input-field" id="custom-key"
                           placeholder="请输入API密钥"
                           style="max-width: 400px;">
                    <button class="test-btn" style="margin-left:10px;" onclick="testModel('custom')">测试连通</button>
                </div>
                <div class="model-version-row">
                    <span class="model-name" style="font-size:13px;">模型版本</span>
                    <input type="text" class="input-field" id="custom-version"
                           placeholder="可选，填写具体模型名称用于 model 字段"
                           style="max-width:320px;">
                </div>
                <div class="test-result" id="custom-test-result"></div>
            </div>
        </div>

        <!-- 保存按钮 -->
        <div class="text-center mt-20">
            <button class="btn btn-primary" id="btn-save" style="min-width: 150px;">保存配置</button>
        </div>

        <!-- 当前配置状态 -->
        <div class="card mt-20">
            <div class="input-group" style="margin-bottom: 0;">
                <label class="input-label">配置状态</label>
                <div id="config-status" style="color: #666;">
                    正在加载...
                </div>
            </div>
        </div>
    </div>

    <!-- 加载状态 -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loading-text">正在保存...</div>
    </div>

    <script src="/static/js/state.js"></script>
    <script src="/static/js/api.js"></script>
    <script>
        // 配置数据
        let configData = null;

        // 模型字段映射
        const modelFields = {
            doubao:  { endpoint: 'doubao-endpoint',  key: 'doubao-key',  version: 'doubao-version'  },
            wenxin:  { endpoint: 'wenxin-endpoint',  key: 'wenxin-key',  version: 'wenxin-version'  },
            qianwen: { endpoint: 'qianwen-endpoint', key: 'qianwen-key', version: 'qianwen-version' },
            zhipu:   { endpoint: 'zhipu-endpoint',   key: 'zhipu-key',   version: 'zhipu-version'   },
            minmax:  { endpoint: 'minmax-endpoint',  key: 'minmax-key',  version: 'minmax-version'  },
            custom: {
                name:     'custom-name',
                endpoint: 'custom-endpoint',
                key:      'custom-key',
                version:  'custom-version'
            }
        };

        // 页面初始化
        document.addEventListener('DOMContentLoaded', async function() {
            await loadConfig();
            bindEvents();
            updateUI();
        });

        // 加载配置
        async function loadConfig() {
            try {
                const response = await API.getConfig();
                configData = response;
                fillFormData();
                updateStatus();
            } catch (error) {
                console.error('加载配置失败:', error);
                alert('加载配置失败');
            }
        }

        // 绑定事件
        function bindEvents() {
            document.getElementById('btn-home').addEventListener('click', goHome);
            document.getElementById('btn-save').addEventListener('click', saveConfig);
            document.getElementById('current-model-select').addEventListener('change', updateUI);
        }

        // 填充表单数据
        function fillFormData() {
            if (!configData) return;

            document.getElementById('current-model-select').value = configData.current_model || 'doubao';

            const models = configData.models || {};

            Object.keys(modelFields).forEach(modelKey => {
                const model = models[modelKey];
                if (!model) return;
                const fields = modelFields[modelKey];

                if (fields.name) {
                    document.getElementById(fields.name).value = model.model_name || '';
                }
                if (fields.endpoint) {
                    const el = document.getElementById(fields.endpoint);
                    if (el && !el.readOnly) el.value = model.endpoint || '';
                    else if (el && el.readOnly) el.value = model.endpoint || el.value;
                }
                if (fields.key) {
                    document.getElementById(fields.key).value = model.api_key || '';
                }
                if (fields.version) {
                    document.getElementById(fields.version).value = model.model_version || '';
                }
            });
        }

        // 更新UI（显示/隐藏自定义配置区域）
        function updateUI() {
            const currentModel = document.getElementById('current-model-select').value;
            const customSection = document.getElementById('custom-section');
            customSection.style.display = currentModel === 'custom' ? 'block' : 'none';
        }

        // 更新状态显示
        function updateStatus() {
            const statusEl = document.getElementById('config-status');
            if (!configData) {
                statusEl.textContent = '加载失败';
                return;
            }

            const currentModel = configData.current_model;
            const model = configData.models[currentModel];

            if (model && model.api_key && model.endpoint) {
                statusEl.innerHTML = '<span style="color:#52c41a;">✓ 已配置</span> - 当前模型: ' + (model.model_name || currentModel);
            } else {
                statusEl.innerHTML = '<span style="color:#ff4d4f;">✕ 未配置</span> - 请完成API Key配置';
            }
        }

        // 测试连通性
        async function testModel(modelKey) {
            const fields = modelFields[modelKey];
            const resultEl = document.getElementById(modelKey + '-test-result');

            const apiKey    = document.getElementById(fields.key).value.trim();
            const endpoint  = document.getElementById(fields.endpoint).value.trim();
            const modelName = fields.version ? document.getElementById(fields.version).value.trim() : '';

            if (!apiKey) {
                resultEl.className = 'test-result err';
                resultEl.textContent = '请先填写 API Key';
                return;
            }
            if (!endpoint) {
                resultEl.className = 'test-result err';
                resultEl.textContent = '请先填写 Endpoint';
                return;
            }

            resultEl.className = 'test-result';
            resultEl.textContent = '测试中...';

            // 禁用该按钮（找到触发的button）
            const btn = document.querySelector(`button[onclick="testModel('${modelKey}')"]`);
            if (btn) btn.disabled = true;

            try {
                const res = await API.testConnection({
                    model_type: modelKey,
                    api_key: apiKey,
                    endpoint: endpoint,
                    model_name: modelName
                });

                resultEl.className = 'test-result ' + (res.success ? 'ok' : 'err');
                resultEl.textContent = (res.success ? '✓ ' : '✕ ') + res.message;
            } catch (err) {
                resultEl.className = 'test-result err';
                resultEl.textContent = '✕ 请求失败: ' + err.message;
            } finally {
                if (btn) btn.disabled = false;
            }
        }

        // 保存配置
        async function saveConfig() {
            const currentModel = document.getElementById('current-model-select').value;
            const fields = modelFields[currentModel];

            let apiKey = '';
            let endpoint = '';
            let modelName = '';
            let modelVersion = '';

            if (currentModel === 'custom') {
                modelName    = document.getElementById('custom-name').value.trim();
                endpoint     = document.getElementById('custom-endpoint').value.trim();
                apiKey       = document.getElementById('custom-key').value.trim();
                modelVersion = document.getElementById('custom-version').value.trim();
            } else {
                endpoint     = document.getElementById(fields.endpoint).value.trim();
                apiKey       = document.getElementById(fields.key).value.trim();
                modelName    = getModelDisplayName(currentModel);
                modelVersion = fields.version ? document.getElementById(fields.version).value.trim() : '';
            }

            if (!apiKey) { alert('请输入API Key'); return; }
            if (!endpoint) { alert('请输入API Endpoint'); return; }
            if (currentModel === 'custom' && !modelName) { alert('请输入自定义模型名称'); return; }

            showLoading('正在保存...');

            try {
                const models = { ...(configData ? configData.models : {}) };
                models[currentModel] = {
                    model_name: modelName,
                    api_key: apiKey,
                    endpoint: endpoint,
                    model_version: modelVersion,
                    is_valid: true
                };

                const newConfig = {
                    current_model: currentModel,
                    models: models
                };

                const response = await API.saveConfig(newConfig);

                if (response.success) {
                    alert('配置保存成功！');
                    configData = newConfig;
                    await GlobalState.checkConfigStatus();
                    updateStatus();
                } else {
                    alert('保存失败: ' + (response.detail || '未知错误'));
                }
            } catch (error) {
                alert('保存失败: ' + error.message);
            } finally {
                hideLoading();
            }
        }

        function getModelDisplayName(key) {
            const names = {
                doubao: '字节豆包', wenxin: '百度文心', qianwen: '阿里千问',
                zhipu: '智谱GLM', minmax: 'MinMax'
            };
            return names[key] || key;
        }

        function goHome() { window.location.href = '/'; }

        function showLoading(text) {
            document.getElementById('loading-text').textContent = text || '正在保存...';
            document.getElementById('loading-overlay').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loading-overlay').classList.remove('active');
        }
    </script>
</body>
</html>
