<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/resume/server/">
    <title>智能简历筛选工具</title>
    <link rel="icon" type="image/svg+xml" href="static/favicon.svg">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <!-- 页面头部 -->
    <header class="page-header">
        <div class="page-header-left">
            <div class="page-header-logo">🎯</div>
            <h1 class="page-title">智能简历筛选工具</h1>
        </div>
        <div class="page-header-actions">
            <button class="btn btn-secondary" id="btn-config">⚙️ API 配置</button>
        </div>
    </header>

    <div class="container">
        <!-- APIkey未配置警示通栏 -->
        <div class="alert-banner hidden" id="alert-banner">
            <span>⚠️ 请先完成 API Key 配置，否则无法使用智能筛选功能</span>
            <button class="btn" id="btn-go-config">去配置</button>
        </div>

        <!-- JD输入区域 -->
        <div class="card mt-20">
            <div class="input-group" style="margin-bottom:0;">
                <label class="input-label">岗位 JD（Job Description）</label>
                <textarea
                    class="input-field"
                    id="jd-input"
                    placeholder="请粘贴或输入岗位JD内容，支持职位职责、任职要求等..."
                    rows="8"
                ></textarea>
            </div>
        </div>

        <!-- 自定义匹配维度 -->
        <div class="card mt-20" id="dimensions-card">
            <div class="dimensions-toggle">
                <label class="input-label" style="margin-bottom:0;">🎛️ 自定义匹配维度 <span style="font-weight:400;color:var(--text-muted);">（可选）</span></label>
                <button class="btn btn-secondary" id="btn-toggle-dimensions" style="padding:6px 12px;font-size:12px;">展开设置</button>
            </div>
            <div id="dimensions-panel" style="display:none;margin-top:18px;">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
                    <div class="input-group" style="margin-bottom:0;">
                        <label class="input-label">工作年限要求</label>
                        <input type="text" class="input-field" id="dim-work-years" placeholder="例：3年以上、5-10年">
                    </div>
                    <div class="input-group" style="margin-bottom:0;">
                        <label class="input-label">学历要求</label>
                        <input type="text" class="input-field" id="dim-education" placeholder="例：本科及以上、硕士优先">
                    </div>
                    <div class="input-group" style="margin-bottom:0;grid-column:1/-1;">
                        <label class="input-label">核心技能权重说明</label>
                        <input type="text" class="input-field" id="dim-skill-weights" placeholder="例：Python、机器学习优先；SQL必须掌握">
                    </div>
                    <div class="input-group" style="margin-bottom:0;grid-column:1/-1;">
                        <label class="input-label">其他要求</label>
                        <input type="text" class="input-field" id="dim-extra" placeholder="例：有大厂经验优先、需要英语良好">
                    </div>
                </div>
                <p style="color:var(--text-muted);font-size:12px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">以上维度将作为额外参考传给大模型，影响匹配评分和分析结果。</p>
            </div>
        </div>

        <!-- 简历上传区域 -->
        <div class="card mt-20">
            <div class="input-group" style="margin-bottom:0;">
                <label class="input-label">上传简历</label>
                <div class="upload-area" id="upload-area">
                    <span class="icon">📂</span>
                    <div class="text">拖拽简历文件到此处，或点击选择文件</div>
                    <div class="hint">支持 PDF、DOC、DOCX、TXT、RTF、图片（JPG/PNG等）格式，最多上传 10 份</div>
                    <input
                        type="file"
                        id="file-input"
                        accept=".pdf,.doc,.docx,.txt,.rtf,.jpg,.jpeg,.png,.bmp,.gif,.tiff,.webp"
                        multiple
                        hidden
                    >
                </div>

                <!-- 文件列表 -->
                <div class="file-list" id="file-list"></div>
            </div>

            <!-- 操作按钮 -->
            <div class="text-center mt-20" style="display:flex;align-items:center;justify-content:center;gap:12px;">
                <button class="btn btn-primary" id="btn-screening" style="min-width:180px;padding:11px 28px;font-size:14px;">
                    🚀 开始智能筛选
                </button>
                <button class="btn btn-secondary" id="btn-clear">
                    🗑️ 清空内容
                </button>
            </div>
        </div>
    </div>

    <!-- 未配置拦截弹框 -->
    <div class="modal-overlay" id="modal-block">
        <div class="modal-content">
            <div class="modal-header">⚠️ 缺少 API Key 配置</div>
            <div class="modal-body">
                当前未完成大模型 API Key 有效配置，无法执行智能筛选，请先完成配置后再操作。
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="btn-cancel">取消</button>
                <button class="btn btn-warning" id="btn-modal-config">去配置 API Key</button>
            </div>
        </div>
    </div>

    <!-- 加载状态 -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loading-text">正在分析中...</div>
    </div>

    <script src="static/js/state.js"></script>
    <script src="static/js/cache.js"></script>
    <script src="static/js/api.js"></script>
    <script src="static/js/toast.js"></script>
    <script src="static/js/index.js"></script>
</body>
</html>
