<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/resume/server/">
    <title>筛选结果 - 智能简历筛选工具</title>
    <link rel="icon" type="image/svg+xml" href="static/favicon.svg">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <!-- 页面头部 -->
    <header class="page-header">
        <div class="page-header-left">
            <div class="page-header-logo">🎯</div>
            <h1 class="page-title">智能简历筛选工具</h1>
        </div>
        <div class="page-header-actions">
            <button class="btn btn-primary" id="btn-export">📊 导出 Excel</button>
            <button class="btn btn-secondary" id="btn-home">← 返回主页</button>
            <button class="btn btn-secondary" id="btn-config">⚙️ API 配置</button>
        </div>
    </header>

    <div class="container">
        <!-- 结果布局 -->
        <div class="result-layout">
            <!-- 左侧简历列表 -->
            <div class="result-sidebar">
                <div class="header">简历列表（按匹配度排序）</div>
                <div class="result-list" id="result-list">
                    <!-- 简历列表项 -->
                </div>
            </div>

            <!-- 右侧详情 -->
            <div class="result-detail" id="result-detail">
                <!-- 简历详情 -->
            </div>
        </div>
    </div>

    <!-- 加载状态 -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在加载...</div>
    </div>

    <script src="static/js/state.js"></script>
    <script src="static/js/api.js"></script>
    <script src="static/js/toast.js"></script>
    <script src="static/js/result.js"></script>
</body>
</html>
